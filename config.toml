# st0x-oracle-server runtime config. Secrets (SIGNER_PRIVATE_KEY,
# ALPACA_API_KEY_ID, ALPACA_API_SECRET_KEY) are supplied via environment
# variables — only non-secret operational settings live here.

port = 3000

# How often the background poller fetches fresh quotes from Alpaca for
# every configured symbol. Requests to /context/v1 always serve from this
# cache — they never hit Alpaca synchronously.
poll_interval_secs = 10

# Token registry: maps on-chain Base token addresses (st0x wrapped
# equities) to Alpaca tickers. USDC is the implicit quote token and is
# hardcoded in main.rs because it's a chain invariant.

