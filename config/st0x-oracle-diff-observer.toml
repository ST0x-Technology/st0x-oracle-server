# Parity-window diff observer (RAI-361). Runs as its own systemd unit
# alongside st0x-oracle-server on the DO droplet during the cutover
# window. Probes both the legacy Fly URL and the new DO URL with the
# same request and emits per-symbol drift metrics. Secrets are an
# empty set — the observer talks to two open `/context/v1` endpoints,
# no API keys required.

# `/metrics` port. Distinct from st0x-oracle-server (3000) so both
# units can run on the same droplet without conflict.
port = 3001

# Seconds between probe rounds. Each round hits both oracles once per
# (symbol, direction) pair, so total request volume is
# `2 * len(symbols) * (60 / probe_interval_secs)` per minute per side.
probe_interval_secs = 30

# Cutover endpoints. The Fly URL is the production oracle Raindex
# consumers currently call; the DO URL is the new tailnet-only
# deployment we're standing up. Both must speak the same
# `/context/v1` ABI shape.
fly_oracle_base_url = "https://st0x-oracle.fly.dev"
do_oracle_base_url = "http://localhost:3000"

# USDC on Base. Implicit quote token for every probe pair.
quote_token = "0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913"

# Token registry — same shape as the oracle's own config, but each
# entry names the base tStock token + the matching pricing symbol.
# Synced with config/st0x-oracle-server.toml.
